<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — E-Voting System</title>
  <!-- Improved Fonts: Clean, modern, and friendly -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg        : #04090f;
      --surface   : #080f1c;
      --surface2  : #0c1525;
      --border    : rgba(0,234,255,.12);
      --border-h  : rgba(0,234,255,.35);
      --cyan      : #00eaff;
      --cyan-dim  : rgba(0,234,255,.7);
      --green     : #00ff88;
      --red       : #ff4466;
      --amber     : #ffb300;
      --text      : rgba(255,255,255,.88);
      --muted     : rgba(255,255,255,.4);
      /* New cleaner font stack */
      --font-body : 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-head : 'Space Grotesk', 'Inter', system-ui, sans-serif;
    }

    body {
      background : var(--bg);
      color      : var(--text);
      font-family: var(--font-body);
      min-height : 100vh;
      display    : flex;
      flex-direction: column;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ─────────────────────────────────────────────────────────── */
    nav {
      display        : flex;
      align-items    : center;
      justify-content: space-between;
      padding        : 1rem 2rem;
      border-bottom  : 1px solid var(--border);
      background     : rgba(4,9,15,.9);
      backdrop-filter: blur(12px);
      position       : sticky;
      top            : 0;
      z-index        : 100;
    }
    .nav-logo {
      font-family   : var(--font-head);
      font-size     : .9rem;
      font-weight   : 600;
      color         : var(--cyan);
      letter-spacing: .18em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--text); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color          : var(--muted);
      text-decoration: none;
      font-size      : .78rem;
      font-weight    : 500;
      letter-spacing : .06em;
      transition     : color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--cyan); }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    main {
      flex    : 1;
      display : flex;
      align-items: center;
      justify-content: center;
      padding : 3rem 1rem;
    }

    .register-shell {
      width    : 100%;
      max-width: 900px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-family   : var(--font-head);
      font-size     : 1.1rem;
      font-weight   : 600;
      letter-spacing: .18em;
      color         : var(--cyan);
      text-transform: uppercase;
      margin-bottom : .3rem;
    }
    .page-sub {
      color        : var(--muted);
      font-size    : .78rem;
      margin-bottom: 2rem;
    }

    /* ── Two-panel grid ──────────────────────────────────────────────────── */
    .panels {
      display             : grid;
      grid-template-columns: 1fr auto 1fr;
      gap                 : 0;
      align-items         : start;
    }
    @media(max-width:680px) {
      .panels { grid-template-columns: 1fr; }
      .arrow-col { display: none; }
    }

    /* ── Form panel ──────────────────────────────────────────────────────── */
    .form-panel {
      background   : var(--surface);
      border       : 1px solid var(--border);
      border-radius: 14px 0 0 14px;
      padding      : 2rem;
    }

    .field-group { margin-bottom: 1.1rem; }
    .field-group label {
      display      : block;
      font-size    : .72rem;
      font-weight  : 500;
      color        : var(--cyan-dim);
      letter-spacing: .1em;
      margin-bottom: .4rem;
      text-transform: uppercase;
    }
    .field-group input,
    .field-group select {
      width       : 100%;
      background  : var(--surface2);
      border      : 1px solid var(--border);
      border-radius: 7px;
      color       : var(--text);
      font-family : var(--font-body);
      font-size   : .85rem;
      padding     : .65rem .9rem;
      outline     : none;
      transition  : border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    .field-group input:focus,
    .field-group select:focus {
      border-color: var(--border-h);
      box-shadow  : 0 0 0 3px rgba(0,234,255,.07);
    }
    .field-group input::placeholder { color: var(--muted); }
    .field-group select option { background: #0c1525; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }

    /* Inline field error */
    .field-err {
      font-size : .7rem;
      color     : var(--red);
      margin-top: .25rem;
      display   : none;
    }
    .field-group.has-error input,
    .field-group.has-error select { border-color: var(--red); }
    .field-group.has-error .field-err { display: block; }

    /* ── Arrow divider ───────────────────────────────────────────────────── */
    .arrow-col {
      display        : flex;
      flex-direction : column;
      align-items    : center;
      justify-content: center;
      padding        : 0 .5rem;
      padding-top    : 7rem;
    }
    .arrow-line {
      width     : 2px;
      height    : 60px;
      background: linear-gradient(to bottom, transparent, var(--cyan), transparent);
    }
    .arrow-head {
      font-size: 1.4rem;
      color    : var(--cyan);
      animation: arrowPulse 1.8s ease-in-out infinite;
    }
    @keyframes arrowPulse {
      0%,100% { opacity: .4; transform: translateX(0); }
      50%     { opacity: 1;  transform: translateX(4px); }
    }

    /* ── FP panel ────────────────────────────────────────────────────────── */
    .fp-panel {
      background   : var(--surface);
      border       : 1px solid var(--border);
      border-left  : none;
      border-radius: 0 14px 14px 0;
      padding      : 2rem;
      display      : flex;
      flex-direction: column;
      align-items  : center;
      gap          : .6rem;
    }
    .fp-panel-title {
      font-family   : var(--font-head);
      font-size     : .72rem;
      font-weight   : 600;
      letter-spacing: .14em;
      color         : var(--cyan-dim);
      text-transform: uppercase;
      align-self    : flex-start;
      margin-bottom : .4rem;
    }
    .fp-required-note {
      font-size  : .7rem;
      color      : var(--amber);
      text-align : center;
      margin-top : .3rem;
      line-height: 1.5;
    }
    #fp-status-badge {
      font-size    : .72rem;
      padding      : .3rem .9rem;
      border-radius: 20px;
      border       : 1px solid var(--border);
      color        : var(--muted);
      margin-top   : .5rem;
    }
    #fp-status-badge.ready  { color: var(--green); border-color: rgba(0,255,136,.35); background: rgba(0,255,136,.06); }
    #fp-status-badge.failed { color: var(--red);   border-color: rgba(255,68,102,.35); }

    /* ── Submit area ─────────────────────────────────────────────────────── */
    .submit-area {
      margin-top: 1.8rem;
      display   : flex;
      flex-direction: column;
      gap       : .8rem;
    }

    .btn-submit {
      width        : 100%;
      padding      : .85rem;
      border-radius: 8px;
      border       : 1.5px solid var(--cyan);
      background   : rgba(0,234,255,.1);
      color        : var(--cyan);
      font-family  : var(--font-head);
      font-size    : .8rem;
      font-weight  : 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor       : pointer;
      transition   : background .25s, box-shadow .25s, transform .1s;
      position     : relative;
      overflow     : hidden;
    }
    .btn-submit:hover:not(:disabled) {
      background: rgba(0,234,255,.2);
      box-shadow: 0 0 20px rgba(0,234,255,.25);
      transform : translateY(-1px);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled {
      opacity: .45;
      cursor : not-allowed;
    }
    .btn-submit .spinner {
      display: none;
      width  : 14px; height: 14px;
      border : 2px solid rgba(0,234,255,.3);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    .btn-submit.loading .spinner { display: inline-block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-link {
      text-align : center;
      font-size  : .75rem;
      color      : var(--muted);
    }
    .login-link a { color: var(--cyan); text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position     : fixed;
      bottom       : 2rem;
      left         : 50%;
      transform    : translateX(-50%) translateY(80px);
      background   : var(--surface2);
      border       : 1px solid var(--border);
      border-radius: 10px;
      padding      : .9rem 1.6rem;
      font-size    : .82rem;
      min-width    : 260px;
      text-align   : center;
      transition   : transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity      : 0;
      z-index      : 999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok   { border-color: rgba(0,255,136,.4); color: var(--green); }
    #toast.err  { border-color: rgba(255,68,102,.4); color: var(--red); }

    /* ── Grid noise overlay (preserved) ─────────────────────────────────── */
    body::before {
      content : "";
      position: fixed;
      inset   : 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px,
          rgba(0,234,255,.025) 39px, rgba(0,234,255,.025) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px,
          rgba(0,234,255,.025) 39px, rgba(0,234,255,.025) 40px);
      pointer-events: none;
      z-index: 0;
    }
    main, nav { position: relative; z-index: 1; }

    footer {
      text-align : center;
      padding    : 1.2rem;
      color      : var(--muted);
      font-size  : .7rem;
      border-top : 1px solid var(--border);
      position   : relative;
      z-index    : 1;
    }
  </style>
</head>
<body>

<!-- ── Navbar (All Roman Urdu removed) ─────────────────────────────────────── -->
<nav>
  <a class="nav-logo" href="index.html">E<span>·</span>VOTE</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="register.html" class="active">Register</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<!-- ── Main ──────────────────────────────────────────────────────────────── -->
<main>
  <div class="register-shell">
    <p class="page-title">Voter Registration</p>
    <p class="page-sub">Fill all fields and fingerprint scan is mandatory</p>

    <div class="panels">

      <!-- LEFT: Form -->
      <div class="form-panel">

        <div class="row-2">
          <div class="field-group" id="fg-name">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Muhammad Ali" autocomplete="name">
            <div class="field-err" id="err-name"></div>
          </div>
          <div class="field-group" id="fg-age">
            <label>Age</label>
            <input type="number" id="age" placeholder="25" min="18" max="120">
            <div class="field-err" id="err-age"></div>
          </div>
        </div>

        <div class="row-2">
          <div class="field-group" id="fg-gender">
            <label>Gender</label>
            <select id="gender">
              <option value="">-- Select --</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
            <div class="field-err" id="err-gender"></div>
          </div>
          <div class="field-group" id="fg-cnic">
            <label>CNIC</label>
            <input type="text" id="cnic" placeholder="12345-1234567-1" maxlength="15">
            <div class="field-err" id="err-cnic"></div>
          </div>
        </div>

        <div class="field-group" id="fg-email">
          <label>Email</label>
          <input type="email" id="email" placeholder="voter@example.com" autocomplete="email">
          <div class="field-err" id="err-email"></div>
        </div>

        <div class="field-group" id="fg-password">
          <label>Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password">
          <div class="field-err" id="err-password"></div>
        </div>

        <div class="field-group" id="fg-address">
          <label>Address</label>
          <input type="text" id="address" placeholder="House number, locality, city" autocomplete="street-address">
          <div class="field-err" id="err-address"></div>
        </div>

        <!-- Hidden FP template -->
        <input type="hidden" id="fp-template-output">

        <div class="submit-area">
          <button class="btn-submit" id="btn-register" onclick="registerUser()">
            <span class="btn-text">Register</span>
            <span class="spinner"></span>
          </button>
          <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
        </div>

      </div><!-- /form-panel -->

      <!-- ARROW -->
      <div class="arrow-col">
        <div class="arrow-line"></div>
        <div class="arrow-head">›</div>
        <div class="arrow-line"></div>
      </div>

      <!-- RIGHT: Fingerprint -->
      <div class="fp-panel">
        <p class="fp-panel-title">Fingerprint Scan</p>
        <div id="fp-container"></div>
        <div id="fp-status-badge">Not scanned</div>
        <p class="fp-required-note">
          ⚠ Registration will not complete<br>without fingerprint scan
        </p>
      </div>

    </div><!-- /panels -->
  </div>
</main>

<footer>© 2025 E-Voting System · Secure · Transparent · Digital</footer>
<div id="toast"></div>

<!-- Scripts (external dependencies unchanged) -->
<script src="js/fingerprint.js"></script>
<script src="js/register.js"></script>
</body>
</html>
