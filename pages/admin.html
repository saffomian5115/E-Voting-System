<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    button {
      padding: 10px 20px;
      background: #ef4444;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #dc2626;
    }
  </style>

</head>

<body onload="loadAdminData()">

<h2>👑 Admin Dashboard</h2>

<div class="card">
  <h3>📊 Results</h3>
  <div id="adminResults"></div>
</div>

<div class="card">
  <h3>👥 Voters</h3>
  <div id="votersList"></div>
</div>

<button onclick="resetVotes()">Reset All Votes</button>

<script src="script.js"></script>

</body>
</html>
