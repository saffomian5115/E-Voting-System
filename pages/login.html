<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Biometric Secure E-Voting System</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="login.css">
</head>

<body>

<header class="main-header">
    <div class="logo">
  <span>E-Voting System</span>
</div>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Registration</a>
        <a href="login.html" class="active">Login</a>
        <a href="vote.html">Vote</a>
        <a href="result.html">Result</a>
    </nav>
</header>

<div class="login-container">

  <div class="login-box">

    <h2>User Login</h2>

    <div class="register-flex">

      <!-- LEFT LOGIN FORM -->
      <div class="form-box">
        <input type="email" id="loginEmail" placeholder="Enter Email">
        <input type="password" id="loginPassword" placeholder="Enter Password">
      </div>

      <!-- ARROW -->
      <div class="arrow">➡️</div>

      <!-- RIGHT FINGERPRINT -->
      <div class="fingerprint-box">
        <h3>Fingerprint Scan</h3>
        <p id="login-fingerprint-status">❌ Not Verified</p>

        <button onclick="verifyLoginFingerprint()" class="finger-btn">
          Scan Finger
        </button>
      </div>

    </div>

    <!-- LOGIN BUTTON -->
    <button onclick="loginUser()" class="register-main-btn">
      Login
    </button>

  </div>

</div>

<footer class="main-footer">
    © 2026 Biometric Secure E-Voting System | All Rights Reserved
</footer>

<script src="script.js"></script>

</body>
</html>
