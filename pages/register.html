<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration - Biometric Secure E-Voting System</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="register.css">
</head>

<body>

<header class="main-header">
  <div class="logo">
  <span>E-Voting System</span>
</div>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html" class="active">Registration</a>
        <a href="login.html">Login</a>
        <a href="vote.html">Vote</a>
        <a href="result.html">Result</a>
    </nav>
</header>

<div class="register-box">

  <h2>Voter Registration</h2>

  <div class="register-flex">

    <!-- LEFT: FORM -->
    <div class="form-box">
      <input type="text" id="regName" placeholder="Full Name" required>
      <input type="text" id="regCnic" placeholder="CNIC" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password" required>
    </div>

    <!-- CENTER ARROW -->
    <div class="arrow">
      ➜
    </div>

    <!-- RIGHT: FINGERPRINT -->
    <div class="fingerprint-box">
      <h3>Fingerprint Scan</h3>

      <p id="fingerprint-status">🔴 Not Verified</p>

      <button onclick="verifyFingerprint()" class="finger-btn">
        Scan Finger
      </button>
    </div>

  </div>

  <!-- REGISTER BUTTON -->
  <button onclick="registerUser()" id="registerBtn" disabled class="register-main-btn">
    Register
  </button>

</div>

    </div>
</div>

<footer class="main-footer">
    © 2026 Biometric Secure E-Voting System | All Rights Reserved
</footer>

<script src="script.js"></script>
</body>
</html>
